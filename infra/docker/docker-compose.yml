# Geliştirme ortamı. MVP'de SQLite yeterli; PostgreSQL bölümü ileride açılır.
services:
  api:
    build:
      context: ../../services/api
    ports:
      - "8000:8000"
    env_file:
      - ../../services/api/.env
    volumes:
      - ../../services/api:/app

