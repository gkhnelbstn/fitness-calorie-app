# Render Blueprint — FastAPI backend (free, kartsız).
# Kurulum: Render Dashboard → New → Blueprint → repo'yu bağla → render.yaml okunur.
# sync:false env'ler dashboard'da elle girilir (gizli değerler repoya girmez).
#
# DB: Supabase doğrudan bağlantı IPv6-only; Render IPv4 → **Session pooler** URI kullan
#     (postgresql+asyncpg://postgres.<ref>:<sifre>@aws-0-<region>.pooler.supabase.com:5432/postgres).
# Başlatma: Dockerfile CMD → start.sh (migrate + idempotent seed + uvicorn).
# Not: dockerCommand KULLANMA — Render onu exec-form sanıp `sh -c "..."`'ı bozar (status 127).
services:
  - type: web
    name: fitkoc-api
    runtime: docker
    rootDir: services/api
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: DEBUG
        value: "false"
      - key: SUPABASE_JWT_ALG
        value: ES256
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: SUPABASE_STORAGE_BUCKET
        value: meal-photos
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_TOKEN
        sync: false
