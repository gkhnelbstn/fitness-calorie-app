# Fly.io yapılandırması — FastAPI backend (free tier).
# İlk kurulum: flyctl launch --no-deploy (app adı al) → flyctl secrets set ... → flyctl deploy
# Secrets (asla repoya girmez): DATABASE_URL, SUPABASE_JWT_SECRET, SUPABASE_PROJECT_URL,
#   SUPABASE_SERVICE_KEY, CORS_ORIGINS, API_TOKEN (admin import gate'i için güçlü değer).
app = "fitkoc-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Deploy başına bir kez: migrate + idempotent seed (yarışsız — release machine).
  release_command = "sh -c 'uv run --no-dev alembic upgrade head && uv run --no-dev python -m app.seeds'"

[env]
  ENVIRONMENT = "prod"
  DEBUG = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
